version: 1
disable_existing_loggers: false

# 单一后端日志：应用日志 + uvicorn 错误 + HTTP 访问日志均写入 .backend.log
formatters:
  default:
    # 访问日志与业务日志共用；访问记录通常无 filename/lineno，故统一用 name + message
    format: "[%(asctime)s] %(levelname)s [%(name)s] %(message)s"
    datefmt: "%y-%m-%d %H:%M:%S"

handlers:
  backend_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: default
    filename: ".backend.log"
    maxBytes: 52428800  # 50MB
    backupCount: 5
    encoding: utf-8

loggers:
  uvicorn:
    level: INFO
    handlers: [backend_file]
    propagate: false
  uvicorn.error:
    level: INFO
    handlers: [backend_file]
    propagate: false
  uvicorn.access:
    level: INFO
    handlers: [backend_file]
    propagate: false

  backend:
    level: INFO
    handlers: [backend_file]
    propagate: false

root:
  level: WARNING
  handlers: [backend_file]
