version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "[%(asctime)s] %(levelname)s [%(name)s:%(filename)s:%(lineno)d] %(message)s"
    datefmt: "%y-%m-%d %H:%M:%S"
  access:
    format: "[%(asctime)s] %(levelname)s [%(name)s] %(message)s"
    datefmt: "%y-%m-%d %H:%M:%S"

handlers:
  backend_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: default
    filename: ".backend.log"
    maxBytes: 52428800  # 50MB
    backupCount: 5
    encoding: utf-8
  access_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: access
    filename: ".backend.access.log"
    maxBytes: 52428800  # 50MB
    backupCount: 5
    encoding: utf-8

loggers:
  uvicorn:
    level: INFO
    handlers: [backend_file]
    propagate: false
  uvicorn.error:
    level: INFO
    handlers: [backend_file]
    propagate: false
  uvicorn.access:
    level: INFO
    handlers: [access_file]
    propagate: false

  backend:
    level: INFO
    handlers: [backend_file]
    propagate: false

root:
  level: WARNING
  handlers: [backend_file]

