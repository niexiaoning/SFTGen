datog:
  taxonomy:
    path: graphgen/configs/datog/cybersecurity/taxonomy.json
    sampling_strategy: depth_weighted
  graph:
    adapter: networkx
    max_hops: 3
    max_nodes_per_subgraph: 15
    serialization_format: markdown
  critic:
    type: llm
    min_score: 0.7
  generation:
    target_qa_pairs: 50
    batch_size: 5
    data_format: ChatML
